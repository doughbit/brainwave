<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brainwave</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="static/style.css">
</head>
<body>
    <div class="container">
        <!-- Top corner controls -->
        <div class="top-controls">
            <button id="themeToggle" class="theme-toggle" title="Toggle dark mode">🌙</button>
            <div id="connectionStatus" class="connection-status" title="Connection status"></div>
        </div>

        <!-- Header -->
        <h1>Brainwave</h1>
        <div class="subtitle">中英文语音转文字 · Speech to Text</div>

        <!-- Model selection -->
        <div class="model-row">
            <label for="modelSelect">Model</label>
            <select id="modelSelect">
                <option value="gpt-realtime-mini-2025-12-15" selected>gpt-realtime-mini</option>
                <option value="gpt-realtime-1.5">gpt-realtime-1.5</option>
            </select>
        </div>

        <!-- Timer -->
        <div id="timer">00:00</div>

        <!-- Record + replay -->
        <div class="record-row">
            <button id="recordButton">Start</button>
            <button id="replayButton" class="replay-icon-button" disabled title="Replay last recording">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                    <path d="M21 3v5h-5"></path>
                    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                    <path d="M3 21v-5h5"></path>
                </svg>
            </button>
        </div>

        <!-- Transcript -->
        <div class="transcript-container">
            <div class="transcript-label">Transcript</div>
            <textarea id="transcript" placeholder="Your speech will appear here…"></textarea>
            <button id="copyButton" class="copy-button">Copy</button>
        </div>

        <!-- Post-processing actions -->
        <div class="button-container">
            <button id="readabilityButton" class="action-button" title="Improve punctuation, grammar, and structure">
                Readability
            </button>
            <button id="correctnessButton" class="action-button" title="Check for factual accuracy">
                Correctness
            </button>
        </div>

        <!-- Enhanced output -->
        <div class="enhanced-transcript-container">
            <div class="transcript-label">Enhanced Output</div>
            <textarea id="enhancedTranscript" placeholder="Readability or Correctness results will appear here…"></textarea>
            <button id="copyEnhancedButton" class="copy-button">Copy</button>
        </div>
    </div>

    <script>
        console.log('HTML loaded, attempting to load main.js...');
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT') {
                console.error('Failed to load script:', e.target.src);
                alert('Failed to load main.js. Please check server logs.');
            }
        }, true);
    </script>
    <script src="static/main.js"></script>
</body>
</html>
